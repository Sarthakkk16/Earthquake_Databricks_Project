resources:
  jobs:
    Dev_Earthquake_End_Job:
      name: Dev_Earthquake_End_Job
      tasks:
        - task_key: Ingestion
          notebook_task:
            notebook_path: ../src/notebooks/Ingestion_bronze.ipynb
            base_parameters:
              catalog_name: ${var.catalog}
            source: WORKSPACE
        - task_key: Bronze_Silver
          depends_on:
            - task_key: Ingestion
          pipeline_task:
            pipeline_id: ${resources.pipelines.Dev_Databricks_Project_bundle_etl.id}
        - task_key: Earthquake_Dashboard
          depends_on:
            - task_key: Bronze_Silver
          dashboard_task:
            subscription: {}
            warehouse_id: 9fe19fadd16c2713
            dashboard_id: ${resources.dashboards.earthquake_monitor.id}
      queue:
        enabled: true
      parameters:
        - name: catalog_name
          default: ${var.catalog}
      performance_target: PERFORMANCE_OPTIMIZED

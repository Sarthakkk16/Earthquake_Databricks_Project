# The main pipeline for Dev_Databricks_Project_bundle

resources:
  pipelines:
    Dev_Databricks_Project_bundle_etl:
      name: Dev_Databricks_Project_bundle_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/notebooks/DLT_Pipeline/Bronze_silver"

      libraries:
        - glob:
            include: ../src/notebooks/DLT_Pipeline/Bronze_silver/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}

# This is a Databricks asset bundle definition for Dev_Databricks_Project_bundle.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: Dev_Databricks_Project_bundle
  uuid: 21f33d7c-c0fa-4a43-a543-6981fabd30e8

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use
  warehouse_id:
    description: WarehouseID

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-1ede60a6-46ee.cloud.databricks.com
    variables:
      catalog: dev
      schema: silver
      warehouse_id: 9fe19fadd16c2713
  prod:
    mode: production
    workspace:
      host: https://dbc-1ede60a6-46ee.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/sarthak5634sharma@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Earthquake_Databricks_Project

    variables:
      catalog: dev
      schema: gold
      warehouse_id: 9fe19fadd16c2713
    permissions:
      - user_name: sarthak5634sharma@gmail.com
        level: CAN_MANAGE
